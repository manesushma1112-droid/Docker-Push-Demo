name: Docker Image Push to Docker Hub

on:
push:
branches:
- main

jobs:
publish_images:
runs-on: ubuntu-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.PTA_DOCKER }}

  - name: Build Backend Image
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/major-project-backend:latest ./backend

  - name: Build Frontend Image
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/major-project-frontend:latest ./frontend

  - name: Build Database Image
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/major-project-database:latest ./database

  - name: Push Backend Image
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/major-project-backend:latest

  - name: Push Frontend Image
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/major-project-frontend:latest

  - name: Push Database Image
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/major-project-database:latest

